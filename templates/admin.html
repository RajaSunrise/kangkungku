<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin - KangkungKu</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee4b",
                        "secondary": "#111812",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Space Grotesk", "sans-serif"],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-gray-50 text-secondary font-body">
    <div class="flex h-screen bg-gray-50 flex-col lg:flex-row relative">
        <!-- Mobile Header -->
        <header class="bg-white border-b border-gray-200 p-4 flex items-center justify-between lg:hidden z-20 relative">
            <h1 class="font-bold text-lg">Panel Admin</h1>
            <button onclick="document.getElementById('admin-sidebar').classList.toggle('-translate-x-full')" class="p-2 rounded-md hover:bg-gray-100 focus:outline-none">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </header>

        <aside id="admin-sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 z-50 transition-transform duration-300 ease-in-out w-64 bg-white border-r border-gray-200 flex flex-col pt-16 lg:pt-0 h-full">
            <div class="p-6 lg:block hidden">
                <h1 class="font-bold text-lg">Panel Admin</h1>
            </div>
            <button onclick="document.getElementById('admin-sidebar').classList.add('-translate-x-full')" class="absolute top-4 right-4 p-2 rounded-md hover:bg-gray-100 lg:hidden focus:outline-none">
                <span class="material-symbols-outlined">close</span>
            </button>
            <nav class="flex-1 px-4 space-y-1 mt-4 lg:mt-0">
                <a href="#" id="nav-dashboard" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 text-gray-900 font-medium">
                    <span class="material-symbols-outlined">dashboard</span> Dasbor
                </a>
                <a href="#" id="nav-diseases" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
                     <span class="material-symbols-outlined">coronavirus</span> Penyakit
                </a>
                <a href="#" id="nav-symptoms" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
                     <span class="material-symbols-outlined">healing</span> Gejala
                </a>
                <a href="#" id="nav-rules" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
                     <span class="material-symbols-outlined">rule</span> Aturan
                </a>
                <a href="#" id="nav-users" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
                     <span class="material-symbols-outlined">group</span> Pengguna
                </a>
                <a href="/calculator.html" id="nav-calculator" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
                     <span class="material-symbols-outlined">calculate</span> Kalkulator
                </a>
                <a href="#" id="btn-logout" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 mt-10">
                    <span class="material-symbols-outlined">logout</span> Keluar
                </a>
            </nav>
        </aside>
        <main id="main-content" class="flex-1 p-8 overflow-y-auto">
            <!-- Content loaded via JS -->
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <!-- Background overlay -->
        <div class="fixed inset-0 bg-secondary/80 backdrop-blur-sm transition-opacity" aria-hidden="true" onclick="hideDeleteModal()"></div>

        <!-- Modal panel -->
        <div class="relative bg-white rounded-2xl overflow-hidden shadow-2xl transform transition-all max-w-sm w-full mx-4 border border-slate-100 flex flex-col p-6 sm:p-8">
            <div class="flex flex-col items-center text-center">
                <div class="flex items-center justify-center w-16 h-16 bg-red-50 rounded-full mb-4">
                    <span class="text-red-500 material-symbols-outlined text-3xl">warning</span>
                </div>
                <h3 class="text-2xl font-black text-slate-900 mb-2" id="modal-title">Hapus Data</h3>
                <p class="text-slate-500 text-sm leading-relaxed mb-8" id="modal-description">Apakah Anda yakin ingin menghapus data ini? Tindakan ini tidak dapat dibatalkan.</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 w-full">
                <button type="button" id="cancel-delete-btn" class="flex-1 px-4 py-3 text-sm font-bold text-slate-700 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-slate-200">
                    Batal
                </button>
                <button type="button" id="confirm-delete-btn" class="flex-1 px-4 py-3 text-sm font-bold text-white bg-red-600 hover:bg-red-700 shadow-lg shadow-red-200 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
                    Ya, Hapus
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
