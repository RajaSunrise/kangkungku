<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin - KangkungKu</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee4b",
                        "secondary": "#111812",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Space Grotesk", "sans-serif"],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-gray-50 text-secondary font-body">
    <div class="flex h-screen bg-gray-50 flex-col lg:flex-row relative">
        <!-- Mobile Header -->
        <header class="bg-white border-b border-gray-200 p-4 flex items-center justify-between lg:hidden z-20 relative">
            <h1 class="font-bold text-lg">Panel Admin</h1>
            <button onclick="document.getElementById('admin-sidebar').classList.toggle('-translate-x-full')" class="p-2 rounded-md hover:bg-gray-100 focus:outline-none">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </header>

        <aside id="admin-sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 z-50 transition-transform duration-300 ease-in-out w-64 bg-white border-r border-gray-200 flex flex-col pt-16 lg:pt-0 h-full">
            <div class="p-6 lg:block hidden">
                <h1 class="font-bold text-lg">Panel Admin</h1>
            </div>
            <button onclick="document.getElementById('admin-sidebar').classList.add('-translate-x-full')" class="absolute top-4 right-4 p-2 rounded-md hover:bg-gray-100 lg:hidden focus:outline-none">
                <span class="material-symbols-outlined">close</span>
            </button>
            <nav class="flex-1 px-4 space-y-1 mt-4 lg:mt-0">
                <a href="#" id="nav-dashboard" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 text-gray-900 font-medium">
                    <span class="material-symbols-outlined">dashboard</span> Dasbor
                </a>
                <a href="#" id="nav-diseases" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
                     <span class="material-symbols-outlined">coronavirus</span> Penyakit
                </a>
                <a href="#" id="nav-symptoms" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
                     <span class="material-symbols-outlined">healing</span> Gejala
                </a>
                <a href="#" id="nav-users" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
                     <span class="material-symbols-outlined">group</span> Pengguna
                </a>
                <a href="/calculator.html" id="nav-calculator" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100">
                     <span class="material-symbols-outlined">calculate</span> Kalkulator
                </a>
                <a href="#" id="btn-logout" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 mt-10">
                    <span class="material-symbols-outlined">logout</span> Keluar
                </a>
            </nav>
        </aside>
        <main id="main-content" class="flex-1 p-8 overflow-y-auto">
            <!-- Content loaded via JS -->
        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <!-- Background overlay -->
            <div class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75" aria-hidden="true"></div>

            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <div class="inline-block px-4 pt-5 pb-4 overflow-hidden text-left align-bottom transition-all transform bg-white rounded-lg shadow-xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">
                <div class="sm:flex sm:items-start">
                    <div class="flex items-center justify-center flex-shrink-0 w-12 h-12 mx-auto bg-red-100 rounded-full sm:mx-0 sm:h-10 sm:w-10">
                        <span class="text-red-600 material-symbols-outlined">warning</span>
                    </div>
                    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                        <h3 class="text-lg font-medium leading-6 text-gray-900" id="modal-title">Hapus Data</h3>
                        <div class="mt-2">
                            <p class="text-sm text-gray-500" id="modal-description">Apakah Anda yakin ingin menghapus data ini? Tindakan ini tidak dapat dibatalkan.</p>
                        </div>
                    </div>
                </div>
                <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
                    <button type="button" id="confirm-delete-btn" class="inline-flex justify-center w-full px-4 py-2 text-base font-medium text-white bg-red-600 border border-transparent rounded-md shadow-sm hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:ml-3 sm:w-auto sm:text-sm">Hapus</button>
                    <button type="button" id="cancel-delete-btn" class="inline-flex justify-center w-full px-4 py-2 mt-3 text-base font-medium text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:w-auto sm:text-sm">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
