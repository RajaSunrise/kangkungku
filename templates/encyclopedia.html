{% extends "base.html" %}

{% block title %}Ensiklopedia - KangkungKu{% endblock %}

{% block content %}
<div class="max-w-[1280px] mx-auto px-4 md:px-8 py-12 flex flex-col gap-8">
        <div class="text-center max-w-2xl mx-auto mb-8">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-emerald-700 text-xs font-bold uppercase tracking-wider mb-4">
                <span class="material-symbols-outlined text-sm">local_florist</span>
                Basis Pengetahuan
            </div>
            <h1 class="text-4xl md:text-5xl font-black tracking-tight text-text-main leading-[1.1]">Ensiklopedia Penyakit</h1>
        </div>

        <div id="loading" class="flex justify-center p-10">
            <span class="material-symbols-outlined animate-spin text-4xl text-primary-text">autorenew</span>
        </div>

        <div id="daftar-penyakit" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Penyakit akan dimuat di sini -->
        </div>
    </div>

    <!-- Modal Detail Penyakit -->
    <div id="modal-detail" class="fixed inset-0 z-[100] hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-secondary/80 backdrop-blur-sm transition-opacity" onclick="tutupDetail()"></div>
        
        <!-- Modal Panel -->
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <div class="relative bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-2xl w-full border border-slate-100 flex flex-col max-h-[90vh]">
                
                <!-- Modal Header with Image -->
                <div class="relative h-48 sm:h-64 shrink-0">
                    <img id="modal-img" src="" alt="" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-secondary/90 to-transparent"></div>
                    <button onclick="tutupDetail()" class="absolute top-4 right-4 size-8 rounded-full bg-black/20 text-white flex items-center justify-center hover:bg-black/40 backdrop-blur-sm transition-colors">
                        <span class="material-symbols-outlined text-xl">close</span>
                    </button>
                    <div class="absolute bottom-0 left-0 p-6">
                        <h3 id="modal-nama" class="text-2xl sm:text-3xl font-black text-white tracking-tight"></h3>
                    </div>
                </div>

                <!-- Modal Body -->
                <div class="p-6 sm:p-8 overflow-y-auto">
                    <div class="mb-8">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="material-symbols-outlined text-amber-500">info</span>
                            <h4 class="text-lg font-bold text-secondary">Deskripsi Penyakit</h4>
                        </div>
                        <p id="modal-deskripsi" class="text-slate-600 leading-relaxed text-sm sm:text-base whitespace-pre-line"></p>
                    </div>

                    <div class="p-5 rounded-xl bg-primary/5 border border-primary/20">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="material-symbols-outlined text-primary-text">healing</span>
                            <h4 class="text-lg font-bold text-secondary">Solusi & Penanganan</h4>
                        </div>
                        <p id="modal-solusi" class="text-slate-700 leading-relaxed text-sm sm:text-base whitespace-pre-line"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>



{% endblock %}

{% block scripts %}
<script>
        let dataPenyakitGlobal = [];

        async function muatPenyakit() {
            const data = await ambilData('/penyakit');
            dataPenyakitGlobal = data || [];
            const wadah = document.getElementById('daftar-penyakit');
            const pemuat = document.getElementById('loading');

            if (dataPenyakitGlobal.length > 0) {
                pemuat.classList.add('hidden');
                wadah.classList.remove('hidden');

                wadah.innerHTML = dataPenyakitGlobal.map(p => `
                    <article class="group bg-white rounded-xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-xl hover:border-primary/50 transition-all duration-300 flex flex-col h-full">
                        <div class="relative h-48 overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent z-10 opacity-60"></div>
                            <img alt="${p.nama}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" src="${p.url_gambar || 'https://via.placeholder.com/400'}" />
                            <div class="absolute top-3 right-3 z-20">
                                <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-amber-100 text-amber-800">
                                    Penyakit
                                </span>
                            </div>
                        </div>
                        <div class="p-5 flex flex-col flex-grow">
                            <div class="mb-3">
                                <h3 class="text-xl font-bold text-text-main group-hover:text-primary-text transition-colors">${p.nama}</h3>
                            </div>
                            <div class="mt-auto pt-4 border-t border-slate-100 flex items-center justify-between">
                                <span class="inline-flex items-center gap-1 text-xs font-semibold text-text-muted uppercase tracking-wider">
                                    Info
                                </span>
                                <button onclick="bukaDetail(${p.id})" class="inline-flex items-center text-sm font-bold text-primary-text hover:text-primary-dark transition-colors gap-1">
                                    Selengkapnya <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
                                </button>
                            </div>
                        </div>
                    </article>
                `).join('');
            }
        }

        function bukaDetail(id) {
            const penyakit = dataPenyakitGlobal.find(p => p.id === id);
            if (!penyakit) return;

            document.getElementById('modal-img').src = penyakit.url_gambar || 'https://via.placeholder.com/800x400';
            document.getElementById('modal-img').alt = penyakit.nama;
            document.getElementById('modal-nama').innerText = penyakit.nama;
            document.getElementById('modal-deskripsi').innerText = penyakit.deskripsi || 'Deskripsi tidak tersedia.';
            document.getElementById('modal-solusi').innerText = penyakit.solusi || 'Solusi tidak tersedia.';

            const modal = document.getElementById('modal-detail');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Prevent scrolling background
        }

        function tutupDetail() {
            const modal = document.getElementById('modal-detail');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        document.addEventListener('DOMContentLoaded', muatPenyakit);
    </script>
{% endblock %}
